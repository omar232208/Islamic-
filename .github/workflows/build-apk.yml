name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build APK via EAS
        run: eas build --local --platform android --profile production --output ./Islamic-App.apk --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANDROID_HOME: /usr/local/lib/android/sdk
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Islamic-App-APK
          path: ./Islamic-App.apk
