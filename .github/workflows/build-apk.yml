name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: |
          pnpm install --ignore-scripts
          pnpm approve-builds --all
          pnpm install

      - name: Typecheck
        run: pnpm run typecheck

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Generate debug keystore
        run: |
          rm -f android/app/debug.keystore
          keytool -genkey -v -keystore android/app/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=, OU=, O=, L=, S=, C="

      - name: Add release signing to build.gradle
        run: |
          sed -i 's/android {/android {\n    signingConfigs {\n        release {\n            storeFile file("debug.keystore")\n            storePassword "android"\n            keyAlias "androiddebugkey"\n            keyPassword "android"\n        }\n    }/' android/app/build.gradle
          sed -i '/buildTypes {/,/^    }/s/release {/release {\n            signingConfig signingConfigs.release/' android/app/build.gradle

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Islamic-App-APK
          path: android/app/build/outputs/apk/release/*.apk
