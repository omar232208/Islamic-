name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: |
          pnpm install --ignore-scripts
          pnpm approve-builds --all
          pnpm install

      - name: Typecheck
        run: pnpm run typecheck

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Prebuild (generate android directory)
        run: npx expo prebuild --platform android --no-install

      - name: Create debug keystore for release signing
        run: |
          keytool -genkey -v -keystore android/app/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=, OU=, O=, L=, S=, C="

      - name: Configure release signing with debug keystore
        run: |
          python3 << 'PYEOF'
with open('android/app/build.gradle', 'r') as f:
    lines = f.readlines()

out = []
android_open = 0
signing_added = False
in_buildtypes = False
in_release = False

for line in lines:
    stripped = line.strip()
    if stripped == 'android {' and not signing_added:
        out.append(line)
        out.append('    signingConfigs {\n')
        out.append('        release {\n')
        out.append('            storeFile file("debug.keystore")\n')
        out.append('            storePassword "android"\n')
        out.append('            keyAlias "androiddebugkey"\n')
        out.append('            keyPassword "android"\n')
        out.append('        }\n')
        out.append('    }\n')
        signing_added = True
    elif stripped == 'release {' and not in_release:
        out.append('        release {\n')
        out.append('            signingConfig signingConfigs.release\n')
        in_release = True
    else:
        if in_release and stripped == '}':
            in_release = False
        out.append(line)

with open('android/app/build.gradle', 'w') as f:
    f.writelines(out)
print('build.gradle patched for release signing')
PYEOF

      - name: Bundle JS and build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Islamic-App-APK
          path: android/app/build/outputs/apk/release/*.apk
